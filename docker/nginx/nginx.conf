worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Gzip compression for better performance 
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    #  PHP-FPM upstream
    upstream php_fpm {
        server app:9000;
    }

    # PUBLIC SITE: gourmet-express.local
    server {
        listen 80;
        server_name gourmet-express.local;
        root /var/www/html/public;
        index index.php;

        # Security headers
        add_header X-Frame-Options       "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header Referrer-Policy       "strict-origin" always;

        # Block access to sensitive files
        location ~ /\.(env|git|htaccess) {
            deny all;
            return 404;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass   php_fpm;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include        fastcgi_params;
            fastcgi_read_timeout 60;
        }

        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }


    # ADMIN PANEL: admin.gourmet-express.local
    # Restricted to localhost only — Nginx blocks all other IPs
    # before PHP ever runs
    server {
        listen 80;
        server_name admin.gourmet-express.local;
        root /var/www/html/public;
        index index.php;

        # IP restriction — first line of defence
        # In production: replace with your office/VPN IP range
        allow 127.0.0.1;
        allow ::1;
        allow 172.16.0.0/12;  # Docker internal network range
        deny all;

        # Security headers — stricter on admin
        add_header X-Frame-Options        "DENY"          always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header Referrer-Policy        "no-referrer"   always;
        add_header Cache-Control          "no-store"      always;

        # Block access to sensitive files
        location ~ /\.(env|git|htaccess) {
            deny all;
            return 404;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass   php_fpm;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include        fastcgi_params;
            fastcgi_read_timeout 60;
        }
    }
}