# Gourmet Express Web Server Configuration
server {
    listen 80;
    server_name gourmet-express.local;
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/html/public;

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }
}

# phpMyAdmin reverse proxy configuration 
server {
    listen 80;
    server_name phpmyadmin.local;

    location / {
        proxy_pass http://restaurant_pma:80; # Points to the Docker service name
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

}

# Admin panel  Configuration— separate virtual host
server {
    listen 80;
    server_name admin.gourmet-express.local;
    index index.php index.html;
    error_log  /var/log/nginx/admin_error.log;
    access_log /var/log/nginx/admin_access.log;
    root /var/www/html/public;

    # IP RESTRICTION 
    # Allow local development access
    allow 127.0.0.1;
    allow 172.16.0.0/12; # Internal Docker network range
    
    # Add specific IP here
    # allow 1.2.3.4; 

    # Block everyone else
    deny all;

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }
}