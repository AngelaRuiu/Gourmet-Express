services:
  app:
    build: 
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: restaurant_app
    restart: unless-stopped
    tty: true
    environment:
      - SERVICE_NAME= app
      - SERVICE_TAGS= dev
    volumes:
      - .:/var/www/html
    env_file: .env
    networks:
      - restaurant_net

  web:
    image: nginx:alpine
    container_name: restaurant_web
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - phpmyadmin
    networks:
      - restaurant_net


  db:
    image: mysql:8.0
    container_name: restaurant_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - restaurant_net

  # phpMyAdmin Service
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: restaurant_pma
    ports:
      - "${PMA_PORT}:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASS}
    depends_on:
      - db
    networks:
      - restaurant_net

networks:
  restaurant_net:
    driver: bridge

volumes:
  db_data:
    driver: local